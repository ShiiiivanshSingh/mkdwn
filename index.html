<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mkdwn</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234493f8'/><text x='50' y='72' font-size='60' font-family='monospace' font-weight='700' text-anchor='middle' fill='white'>m</text></svg>" />

  <!-- Syntax highlighting + math themes (swapped at runtime for dark mode) -->
  <link id="hljs-theme" rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css" />
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>

  <!-- Icons -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.460.0/dist/umd/lucide.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">
  <!-- ============ Sidebar: document list ============ -->
  <aside id="sidebar">
    <div class="brand">
      <i data-lucide="square-pen"></i>
      <span class="brand-mark">mkdwn</span>
    </div>
    <div class="sidebar-actions">
      <button id="templatesBtn" class="btn-primary" title="Browse templates">
        <i data-lucide="layout-template"></i><span>Templates</span>
      </button>
    </div>
    <div class="sidebar-head">
      <span>Documents</span>
      <button id="newDocBtn" class="icon-btn" title="New document"><i data-lucide="plus"></i></button>
    </div>
    <ul id="docList"></ul>
    <div class="sidebar-foot">
      <a id="repoLink" class="icon-btn" href="https://github.com/ShiiiivanshSingh/mkdwn"
         target="_blank" rel="noopener" title="View source on GitHub"><i data-lucide="github"></i></a>
      <button id="collapseSidebar" class="icon-btn" title="Hide sidebar"><i data-lucide="panel-left-close"></i></button>
    </div>
  </aside>

  <div id="main">
    <!-- ============ Top bar ============ -->
    <header class="topbar">
      <button id="showSidebar" class="icon-btn" title="Show sidebar"><i data-lucide="panel-left"></i></button>
      <input id="docTitle" class="doc-title" title="Document title" />

      <div class="toolbar" id="toolbar">
        <button class="icon-btn" data-md="bold"   title="Bold (Ctrl+B)"><i data-lucide="bold"></i></button>
        <button class="icon-btn" data-md="italic" title="Italic (Ctrl+I)"><i data-lucide="italic"></i></button>
        <button class="icon-btn" data-md="strike" title="Strikethrough"><i data-lucide="strikethrough"></i></button>
        <span class="sep"></span>
        <button class="icon-btn" data-md="h1" title="Heading 1"><i data-lucide="heading-1"></i></button>
        <button class="icon-btn" data-md="h2" title="Heading 2"><i data-lucide="heading-2"></i></button>
        <button class="icon-btn" data-md="h3" title="Heading 3"><i data-lucide="heading-3"></i></button>
        <span class="sep"></span>
        <button class="icon-btn" data-md="ul"    title="Bullet list"><i data-lucide="list"></i></button>
        <button class="icon-btn" data-md="ol"    title="Numbered list"><i data-lucide="list-ordered"></i></button>
        <button class="icon-btn" data-md="task"  title="Task list"><i data-lucide="list-checks"></i></button>
        <button class="icon-btn" data-md="quote" title="Blockquote"><i data-lucide="text-quote"></i></button>
        <span class="sep"></span>
        <button class="icon-btn" data-md="code"      title="Inline code"><i data-lucide="code"></i></button>
        <button class="icon-btn" data-md="codeblock" title="Code block"><i data-lucide="braces"></i></button>
        <button class="icon-btn" data-md="link"      title="Link (Ctrl+K)"><i data-lucide="link"></i></button>
        <button class="icon-btn" data-md="image"     title="Image"><i data-lucide="image"></i></button>
        <button class="icon-btn" data-md="table"     title="Table"><i data-lucide="table"></i></button>
        <button class="icon-btn" data-md="hr"        title="Horizontal rule"><i data-lucide="minus"></i></button>
      </div>

      <div class="actions">
        <button id="paletteBtn" class="btn-text" title="Command palette (Ctrl+P)"><i data-lucide="command"></i><span>Palette</span></button>
        <button id="togglePreview" class="icon-btn" title="Toggle preview"><i data-lucide="eye"></i></button>
        <button id="zenBtn"        class="icon-btn" title="Zen mode"><i data-lucide="maximize"></i></button>
        <button id="themeBtn"      class="icon-btn" title="Toggle dark mode"><i data-lucide="moon"></i></button>
      </div>
    </header>

    <!-- ============ Editor + preview ============ -->
    <div class="workspace" id="panes">
      <section class="pane editor-pane" id="editorPane">
        <textarea id="editor" spellcheck="true"
          placeholder="# Start typing…  (type / for commands)"></textarea>
        <!-- Slash command menu -->
        <div id="slashMenu" class="slash-menu" hidden></div>
        <!-- Find & replace -->
        <div id="findPanel" class="find-panel" hidden>
          <div class="find-row">
            <input id="findInput" placeholder="Find" />
            <button id="findPrev" title="Previous">↑</button>
            <button id="findNext" title="Next">↓</button>
            <span id="findCount" class="find-count">0/0</span>
            <button id="findClose" title="Close">✕</button>
          </div>
          <div class="find-row">
            <input id="replaceInput" placeholder="Replace" />
            <button id="replaceOne">Replace</button>
            <button id="replaceAll">All</button>
            <label class="chk"><input type="checkbox" id="findRegex" /> .*</label>
            <label class="chk"><input type="checkbox" id="findCase" /> Aa</label>
          </div>
        </div>
      </section>

      <div id="divider" title="Drag to resize"></div>

      <section class="pane preview-pane" id="previewPane">
        <article id="preview" class="markdown-body"></article>
      </section>
    </div>

    <!-- ============ Status bar ============ -->
    <footer class="statusbar">
      <span id="saveStatus">Saved</span>
      <span class="stats">
        <button id="historyBtn" class="link-btn" title="Version history"><i data-lucide="history"></i> History</button> ·
        <span id="wordCount">0 words</span> ·
        <span id="charCount">0 chars</span> ·
        <span id="readTime">0 min</span>
      </span>
    </footer>
  </div>
</div>

<!-- ============ Templates picker ============ -->
<div id="templatesModal" class="overlay" hidden>
  <div class="modal-box modal-box-wide">
    <div class="modal-head">
      <span>Start from a template</span>
      <button id="templatesClose" class="icon-btn">✕</button>
    </div>
    <p class="tpl-sub">Pick a starting point — or press <kbd>Esc</kbd> to begin with a blank page.</p>
    <div id="templatesList" class="tpl-grid"></div>
  </div>
</div>

<!-- ============ Floating zen-mode exit (only shown in zen mode) ============ -->
<button id="zenExit" title="Exit zen mode (Esc)"><i data-lucide="minimize"></i><span>Exit zen</span></button>

<!-- ============ Command palette ============ -->
<div id="palette" class="overlay" hidden>
  <div class="palette-box">
    <input id="paletteInput" placeholder="Type a command…" />
    <ul id="paletteList"></ul>
  </div>
</div>

<!-- ============ History modal ============ -->
<div id="historyModal" class="overlay" hidden>
  <div class="modal-box">
    <div class="modal-head">
      <span>Version history</span>
      <button id="historyClose">✕</button>
    </div>
    <ul id="historyList"></ul>
  </div>
</div>

<input type="file" id="fileInput" accept=".md,.markdown,.txt" hidden />

<script src="app.js"></script>
</body>
</html>
